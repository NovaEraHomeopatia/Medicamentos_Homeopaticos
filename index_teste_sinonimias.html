<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo de Homeopatia - Teste de Sinonimias</title>

  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    body { font-family: Arial, sans-serif; margin: 20px; line-height: 1.4; }
    h1 { margin: 0 0 4px 0; text-align: center; font-size: 34px; line-height: 1.15; }
    @media (max-width: 480px) { h1 { font-size: 26px; } }
    .atualizado-linha { margin: 0 0 10px 0; font-size: 14px; color: #555; text-align: center; }
    .topo-destaque {
      margin: 0 0 12px 0; padding: 10px 12px; background: #f6f7f9; border: 1px solid #e3e6ea;
      border-radius: 10px; color: #222; font-size: 14px; font-weight: 600; line-height: 1.2;
      display: flex; gap: 10px; align-items: center; justify-content: center; text-align: center;
    }
    .icone-alerta { width: 18px; height: 18px; flex: 0 0 auto; }
    .loading { margin: 12px 0; }
    .erro { color: #b00020; font-weight: bold; margin: 12px 0; }
    .info-teste {
      margin: 0 0 12px 0; padding: 10px 12px; background: #eef6ff; border: 1px solid #b7d3f2;
      border-radius: 10px; color: #154b82; font-size: 14px; text-align: center;
    }
    .sinonimia-aviso{
      display:none; margin:0 0 12px 0; padding:10px 12px; background:#fff7e6; border:1px solid #f0d58a;
      border-radius:10px; color:#6b4e00; font-size:14px; line-height:1.35; text-align:center;
    }
    table.dataTable thead th { white-space: nowrap; }
    #tabela td.col-medicamento, #tabela td.col-termo { font-weight: 600; }
    #tabela td.col-potencias { white-space: pre-wrap; font-variant-numeric: tabular-nums; }
    .rodape { margin-top: 14px; font-size: 12px; color: #666; }
    div.dataTables_filter label { font-weight: 800; text-transform: uppercase; }
    div.dataTables_filter label::before{
      content: ""; display: inline-block; width: 16px; height: 16px; margin-right: 6px; vertical-align: -3px;
      background-repeat: no-repeat; background-size: 16px 16px;
      background-image: url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2024%2024'%3E%3Ccircle%20cx='11'%20cy='11'%20r='7'%20fill='none'%20stroke='%23333'%20stroke-width='2'/%3E%3Cline%20x1='16.65'%20y1='16.65'%20x2='22'%20y2='22'%20stroke='%23333'%20stroke-width='2'%20stroke-linecap='round'/%3E%3C/svg%3E");
    }
    div.dataTables_filter input { padding: 6px 8px; font-size: 14px; }
  </style>
</head>

<body>
  <h1>Catálogo de Homeopatia - Teste de Sinonimias</h1>

  <div class="atualizado-linha">
    <span>Atualizado em </span><span id="dataAtualizacao">carregando...</span>
  </div>

  <div class="info-teste">
    Pagina de teste em paralelo. Nao substitui o catalogo oficial.
  </div>

  <div class="topo-destaque">
    <svg class="icone-alerta" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M12 3L1 21h22L12 3z" fill="#c98a00"></path>
      <rect x="11" y="9" width="2" height="7" fill="#ffffff"></rect>
      <rect x="11" y="18" width="2" height="2" fill="#ffffff"></rect>
    </svg>
    <div>Digite o medicamento no campo <b>BUSCAR</b> abaixo.</div>
  </div>

  <div id="avisoSinonimia" class="sinonimia-aviso"></div>
  <div id="status" class="loading">Carregando dados...</div>

  <table id="tabela" class="display" style="width:100%">
    <thead></thead>
    <tbody></tbody>
  </table>

  <div class="rodape">
    Teste de busca por sinonimias com nome principal oculto.
  </div>

  <script>
    const ARQUIVO_CSV = "dados.csv";
    const ARQUIVO_SINONIMIAS = "sinonimias_site_busca.csv";
    const DELIMITADOR = ";";

    const CABECALHO_NORMAL = ["Medicamento", "Escala", "Potencias disponiveis"];
    const CABECALHO_SINONIMIA = ["Sinonimia", "Escalas e potencias"];

    const GITHUB_USER = "NovaEraHomeopatia";
    const GITHUB_REPO = "Medicamentos_Homeopaticos";
    const GITHUB_BRANCH = "main";

    let dadosCatalogo = [];
    let sinonimiasBusca = [];
    let tabelaAtiva = null;

    function normalizarBusca(txt) {
      return String(txt ?? "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toUpperCase()
        .replace(/\s+/g, " ")
        .trim();
    }

    function normalizarPotencias(txt) {
      const s = (txt ?? "").toString().trim();
      if (!s) return "";
      return s.replace(/\s+/g, "   ");
    }

    function formatarDataHoraBR(d) {
      const optsData = { timeZone: "America/Sao_Paulo", day: "2-digit", month: "2-digit", year: "numeric" };
      const optsHora = { timeZone: "America/Sao_Paulo", hour: "2-digit", minute: "2-digit", hour12: false };
      const data = new Intl.DateTimeFormat("pt-BR", optsData).format(d);
      const hora = new Intl.DateTimeFormat("pt-BR", optsHora).format(d);
      return `${data} às ${hora}`;
    }

    async function atualizarDataDoCatalogo() {
      const el = document.getElementById("dataAtualizacao");
      if (!el) return;

      const rawUrl = `https://raw.githubusercontent.com/${encodeURIComponent(GITHUB_USER)}/${encodeURIComponent(GITHUB_REPO)}/${encodeURIComponent(GITHUB_BRANCH)}/${encodeURIComponent(ARQUIVO_CSV)}?v=${Date.now()}`;

      try {
        const resp = await fetch(rawUrl, { method: "HEAD", cache: "no-store" });
        const lm = resp.headers.get("Last-Modified");
        if (lm) {
          el.textContent = formatarDataHoraBR(new Date(lm));
          return;
        }
      } catch (e) {}

      el.textContent = "indisponivel";
    }

    function ajustarRotuloBuscar() {
      const label = document.querySelector("div.dataTables_filter label");
      if (!label) return;
      for (const node of Array.from(label.childNodes)) {
        if (node.nodeType === Node.TEXT_NODE) {
          node.nodeValue = "BUSCAR: ";
        }
      }
    }

    function limparAvisoSinonimia() {
      const el = document.getElementById("avisoSinonimia");
      if (!el) return;
      el.style.display = "none";
      el.textContent = "";
    }

    function mostrarAvisoSinonimia(termo) {
      const el = document.getElementById("avisoSinonimia");
      if (!el) return;
      el.textContent = `Busca realizada por sinonimia: "${termo}".`;
      el.style.display = "block";
    }

    function destruirTabelaSeExistir() {
      if ($.fn.DataTable.isDataTable("#tabela")) {
        $("#tabela").DataTable().destroy();
      }
      document.querySelector("#tabela thead").innerHTML = "";
      document.querySelector("#tabela tbody").innerHTML = "";
    }

    function montarTabela(cabecalho, linhas, tipo) {
      destruirTabelaSeExistir();

      const thead = document.querySelector("#tabela thead");
      const trHead = document.createElement("tr");
      cabecalho.forEach(col => {
        const th = document.createElement("th");
        th.textContent = col || "";
        trHead.appendChild(th);
      });
      thead.appendChild(trHead);

      const tbody = document.querySelector("#tabela tbody");
      linhas.forEach(linha => {
        const tr = document.createElement("tr");
        linha.forEach((cel, idx) => {
          const td = document.createElement("td");
          const valor = String(cel ?? "");
          if (tipo === "normal") {
            if (idx === 0) td.classList.add("col-medicamento");
            if (idx === 2) {
              td.classList.add("col-potencias");
              td.textContent = normalizarPotencias(valor);
            } else {
              td.textContent = valor;
            }
          } else {
            if (idx === 0) td.classList.add("col-termo");
            if (idx === 1) td.classList.add("col-potencias");
            td.textContent = idx === 1 ? normalizarPotencias(valor) : valor;
          }
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });

      tabelaAtiva = $("#tabela").DataTable({
        pageLength: 100,
        lengthMenu: [[10, 25, 50, 100], [10, 25, 50, 100]],
        order: [],
        language: {
          decimal: ",",
          thousands: ".",
          lengthMenu: "Mostrar _MENU_ registros",
          zeroRecords: "Nenhum resultado encontrado",
          info: "Mostrando _START_ a _END_ de _TOTAL_ registros",
          infoEmpty: "Mostrando 0 a 0 de 0 registros",
          infoFiltered: "(filtrado de _MAX_ registros no total)",
          search: "Buscar:",
          paginate: {
            first: "Primeira",
            previous: "Anterior",
            next: "Proxima",
            last: "Ultima"
          }
        },
        initComplete: function () {
          ajustarRotuloBuscar();
          document.getElementById("status").style.display = "none";
        }
      });

      const $input = $('div.dataTables_filter input');
      $input.off('keyup.DT input.DT');
      $input.on('input', function () {
        aplicarBusca(this.value || "");
      });
    }

    function parseCsvRows(rows) {
      const out = [];
      for (const row of rows) {
        if (!row || !row.length) continue;
        const vals = row.map(v => String(v ?? ""));
        if (vals.every(v => v.trim() === "")) continue;
        out.push(vals);
      }
      return out;
    }

    function carregarArquivos() {
      Papa.parse(ARQUIVO_CSV, {
        download: true,
        header: false,
        delimiter: DELIMITADOR,
        skipEmptyLines: true,
        encoding: "UTF-8",
        complete: function (results) {
          const rows = parseCsvRows(results.data || []);
          let corpo = rows;

          if (rows.length && rows[0].length >= 3) {
            const h0 = normalizarBusca(rows[0][0]);
            const h1 = normalizarBusca(rows[0][1]);
            if (h0 === "MEDICAMENTO" && h1 === "ESCALA") {
              corpo = rows.slice(1);
            }
          }

          dadosCatalogo = corpo.map(r => ({
            medicamento: String(r[0] ?? "").trim(),
            escala: String(r[1] ?? "").trim(),
            potencias: String(r[2] ?? "").trim(),
            medicamentoNorm: normalizarBusca(r[0] ?? "")
          }));

          Papa.parse(ARQUIVO_SINONIMIAS, {
            download: true,
            header: true,
            delimiter: ",",
            skipEmptyLines: true,
            encoding: "UTF-8",
            complete: function (synRes) {
              sinonimiasBusca = (synRes.data || []).map(r => ({
                sinonimia: String(r.SINONIMIA ?? "").trim(),
                medicamento: String(r.MEDICAMENTO ?? "").trim(),
                sinonimiaNorm: normalizarBusca(r.SINONIMIA ?? ""),
                medicamentoNorm: normalizarBusca(r.MEDICAMENTO ?? "")
              })).filter(x => x.sinonimiaNorm && x.medicamentoNorm);

              montarTabela(CABECALHO_NORMAL, [], "normal");
              document.getElementById("status").textContent = "";
            },
            error: function () {
              document.getElementById("status").className = "erro";
              document.getElementById("status").textContent = "Erro ao carregar o arquivo de sinonimias.";
            }
          });
        },
        error: function () {
          document.getElementById("status").className = "erro";
          document.getElementById("status").textContent = "Erro ao carregar o arquivo do catalogo.";
        }
      });
    }

    function aplicarBusca(texto) {
      const termo = String(texto || "").trim();
      const termoNorm = normalizarBusca(termo);
      limparAvisoSinonimia();

      if (!termoNorm) {
        montarTabela(CABECALHO_NORMAL, [], "normal");
        return;
      }

      const diretos = dadosCatalogo
        .filter(r => r.medicamentoNorm.startsWith(termoNorm))
        .map(r => [r.medicamento, r.escala, r.potencias]);

      if (diretos.length > 0) {
        montarTabela(CABECALHO_NORMAL, diretos, "normal");
        return;
      }

      const sinonimiasEncontradas = sinonimiasBusca.filter(s => s.sinonimiaNorm.startsWith(termoNorm));
      if (sinonimiasEncontradas.length === 0) {
        montarTabela(CABECALHO_NORMAL, [], "normal");
        return;
      }

      const grupos = new Map();
      for (const s of sinonimiasEncontradas) {
        if (!grupos.has(s.sinonimiaNorm)) {
          grupos.set(s.sinonimiaNorm, {
            sinonimia: s.sinonimia,
            medicamentosNorm: new Set([s.medicamentoNorm])
          });
        } else {
          grupos.get(s.sinonimiaNorm).medicamentosNorm.add(s.medicamentoNorm);
        }
      }

      const linhasSinonimia = [];
      for (const g of grupos.values()) {
        const pares = [];
        dadosCatalogo.forEach(r => {
          if (g.medicamentosNorm.has(r.medicamentoNorm)) {
            const parte = r.escala ? `${r.escala}: ${r.potencias}` : r.potencias;
            if (parte && !pares.includes(parte)) pares.push(parte);
          }
        });

        if (pares.length > 0) {
          linhasSinonimia.push([g.sinonimia, pares.join("   ")]);
        }
      }

      if (linhasSinonimia.length > 0) {
        mostrarAvisoSinonimia(termo);
        montarTabela(CABECALHO_SINONIMIA, linhasSinonimia, "sinonimia");
      } else {
        montarTabela(CABECALHO_NORMAL, [], "normal");
      }
    }

    atualizarDataDoCatalogo();
    carregarArquivos();
  </script>
</body>
</html>
